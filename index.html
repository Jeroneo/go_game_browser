<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KataGo Web</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --panel-bg: #2b2b36;
            --text-main: #f5f5f5;
            --text-muted: #a0a0b0;
            --board-wood: #e3c18c;
            --board-shadow: #8b6b43;
            --accent: #4a90e2;
            --accent-hover: #357abd;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 30px 15px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0 0 5px 0;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .controls-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        select, button {
            padding: 10px 16px;
            font-size: 0.95rem;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            transition: all 0.2s ease;
        }

        select:focus {
            border-color: var(--accent);
        }

        select option {
            background: var(--panel-bg);
            color: white;
        }

        button {
            background-color: var(--accent);
            border: none;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        .board-wrapper {
            position: relative;
            padding: 10px;
            background: linear-gradient(135deg, #f3d4a4 0%, var(--board-wood) 100%);
            border-radius: 4px;
            box-shadow: 
                inset 0 0 15px var(--board-shadow),
                0 8px 20px rgba(0,0,0,0.4);
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 10px;
        }

        #status {
            font-weight: bold;
            font-size: 1.1rem;
            padding: 10px 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.2);
            letter-spacing: 0.5px;
        }

        .status-thinking {
            color: #ffd700;
            animation: pulse 1.5s infinite;
        }

        .status-turn {
            color: #4cd137;
        }

        .status-error {
            color: #e84118;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>KataGo Web</h1>
        <p>Standard 19x19 Championship Go</p>
    </div>

    <div class="game-container">
        <div class="controls-top">
            <div class="control-group">
                <label for="difficulty">AI Strength:</label>
                <select id="difficulty">
                    <option value="easy">Easy (10 Visits)</option>
                    <option value="medium" selected>Medium (100 Visits)</option>
                    <option value="hard">Hard (500 Visits)</option>
                </select>
            </div>
            <button onclick="resetGame()">Resign / New Game</button>
        </div>

        <div class="board-wrapper">
            <canvas id="goBoard" width="600" height="600"></canvas>
        </div>
        
        <div class="status-bar">
            <div id="status" class="status-turn">Your Turn (Black)</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('goBoard');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        
        // 19x19 Board Setup
        const boardSize = 19;
        const cellSize = canvas.width / (boardSize + 1);
        // Standard Go coordinates omit 'I' to avoid confusion with '1' or 'J'
        const columns = "ABCDEFGHJKLMNOPQRST"; 
        
        let boardState = {}; 
        let moveHistory = [];
        let isPlayerTurn = true;

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Grid
            ctx.beginPath();
            ctx.strokeStyle = '#2c1e0e';
            ctx.lineWidth = 1;
            
            for (let i = 1; i <= boardSize; i++) {
                // Vertical lines
                ctx.moveTo(i * cellSize, cellSize);
                ctx.lineTo(i * cellSize, canvas.height - cellSize);
                // Horizontal lines
                ctx.moveTo(cellSize, i * cellSize);
                ctx.lineTo(canvas.width - cellSize, i * cellSize);
            }
            ctx.stroke();

            // Draw Hoshi (Star Points) for 19x19 board
            const hoshiPoints = [4, 10, 16];
            ctx.fillStyle = '#2c1e0e';
            for (let x of hoshiPoints) {
                for (let y of hoshiPoints) {
                    ctx.beginPath();
                    ctx.arc(x * cellSize, y * cellSize, 3.5, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }

            // Draw Stones
            for (const [coord, color] of Object.entries(boardState)) {
                drawStone(coord, color);
            }
        }

        function getGoCoord(x, y) {
            const colIdx = Math.round(x / cellSize) - 1;
            const row = Math.round(y / cellSize);
            // Reverse row mapping so row 1 is at the bottom, 19 is at the top (standard GTP format)
            const gtpRow = boardSize - row + 1;
            
            if (colIdx >= 0 && colIdx < boardSize && row >= 1 && row <= boardSize) {
                return columns[colIdx] + gtpRow;
            }
            return null;
        }

        function getPixels(coord) {
            const col = columns.indexOf(coord[0]);
            const gtpRow = parseInt(coord.substring(1));
            // Convert GTP row back to canvas row (1 is bottom, 19 is top)
            const row = boardSize - gtpRow + 1;
            
            return {
                x: (col + 1) * cellSize,
                y: row * cellSize
            };
        }

        function drawStone(coord, color) {
            const pos = getPixels(coord);
            const radius = cellSize * 0.46; // Make stones almost touch
            
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, radius, 0, 2 * Math.PI);
            
            // Create 3D gradient effect
            const gradient = ctx.createRadialGradient(
                pos.x - radius * 0.3, pos.y - radius * 0.3, radius * 0.1,
                pos.x, pos.y, radius
            );

            if (color === 'black') {
                gradient.addColorStop(0, '#666');
                gradient.addColorStop(0.4, '#111');
                gradient.addColorStop(1, '#000');
            } else {
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.7, '#e0e0e0');
                gradient.addColorStop(1, '#999');
            }

            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Subtle shadow border
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        function setStatus(text, state) {
            statusEl.innerText = text;
            statusEl.className = '';
            if (state === 'thinking') statusEl.classList.add('status-thinking');
            else if (state === 'turn') statusEl.classList.add('status-turn');
            else if (state === 'error') statusEl.classList.add('status-error');
        }

        canvas.addEventListener('click', async (e) => {
            if (!isPlayerTurn) return;

            const rect = canvas.getBoundingClientRect();
            // Adjust for scale if CSS resizes the canvas
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            
            const coord = getGoCoord(x, y);

            if (coord && !boardState[coord]) {
                boardState[coord] = 'black';
                moveHistory.push(coord);
                drawBoard();
                isPlayerTurn = false;
                setStatus("KataGo is thinking...", "thinking");

                await fetchAIMove();
            }
        });

        async function fetchAIMove() {
            const difficulty = document.getElementById('difficulty').value;
            
            try {
                const response = await fetch('/api/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        history: moveHistory,
                        difficulty: difficulty,
                        board_size: boardSize
                    })
                });

                const data = await response.json();
                const aiMove = data.ai_move;

                if (aiMove.toUpperCase() !== "PASS" && aiMove.toUpperCase() !== "RESIGN") {
                    boardState[aiMove] = 'white';
                    moveHistory.push(aiMove);
                    setStatus("Your Turn (Black)", "turn");
                } else {
                    setStatus(`Game Over - AI ${aiMove.toUpperCase()}`, "turn");
                }

                drawBoard();
                isPlayerTurn = true;

            } catch (error) {
                console.error("API Error:", error);
                setStatus("Error reaching AI.", "error");
                isPlayerTurn = true;
            }
        }

        function resetGame() {
            boardState = {};
            moveHistory = [];
            isPlayerTurn = true;
            setStatus("Your Turn (Black)", "turn");
            drawBoard();
        }

        // Initialize board on load
        drawBoard();
    </script>
</body>
</html>
