<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KataGo 圍棋</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2235%22 cy=%2240%22 r=%2230%22 fill=%22black%22 stroke=%22%23333%22 stroke-width=%222%22/><circle cx=%2265%22 cy=%2260%22 r=%2230%22 fill=%22%23fdf5e6%22 stroke=%22%23ccc%22 stroke-width=%222%22/></svg>">
    
    <style>
        :root {
            --bg-ink: #140f0c;
            --paper-ivory: #e8dcc4;
            --gold-accent: #c5a059;
            --red-seal: #9e2a2b;
            --wood-board: #dcb35c;
            --wood-dark: #2a1c15;
            --wood-border: #4a3018;
        }

        * { box-sizing: border-box; }

        body {
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            background: radial-gradient(circle at center, #241a14 0%, var(--bg-ink) 100%);
            color: var(--paper-ivory);
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .layout-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 60px;
            width: 100%;
            max-width: 1300px;
            padding: 20px;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 320px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
        }

        .header h1 {
            margin: 0;
            font-size: 2.8rem;
            color: var(--gold-accent);
            letter-spacing: 2px;
        }

        .controls {
            background: rgba(42, 28, 21, 0.6);
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 25px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        select {
            background-color: var(--wood-dark);
            color: var(--paper-ivory);
            border: 1px solid var(--gold-accent);
            padding: 8px;
            font-family: inherit;
            transition: opacity 0.3s ease;
        }

        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: rgba(197, 160, 89, 0.2);
        }

        button {
            background-color: transparent;
            color: var(--red-seal);
            border: 2px solid var(--red-seal);
            padding: 10px;
            font-family: "MingLiU", "SimSun", serif;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--red-seal);
            color: var(--paper-ivory);
        }

        .btn-self-play {
            color: var(--gold-accent);
            border-color: var(--gold-accent);
        }

        .btn-self-play:hover {
            background-color: var(--gold-accent);
            color: var(--bg-ink);
        }

        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-left: 3px solid var(--gold-accent);
            background: rgba(0,0,0,0.4);
        }

        .credits {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(232, 220, 196, 0.4);
        }

        .board-wrapper {
            background: var(--wood-board);
            border: 12px solid var(--wood-border);
            box-shadow: 15px 15px 40px rgba(0,0,0,0.8);
        }

        canvas {
            display: block;
            max-width: 80vh;
            max-height: 80vh;
        }
    </style>
</head>
<body>

    <div class="layout-container">
        <div class="left-panel">
            <div class="header">
                <h1>KataGo</h1>
                <p>Traditional Weiqi</p>
            </div>

            <div class="controls">
                <label style="font-size: 0.8rem; color: var(--gold-accent); margin-bottom: -10px;">AI STRENGTH</label>
                <select id="difficulty">
                    <option value="easy">Easy (10 Visits)</option>
                    <option value="medium" selected>Medium (100 Visits)</option>
                    <option value="hard">Hard (500 Visits)</option>
                </select>

                <button onclick="resetGame()">重新開始<br><small>New Game</small></button>
                <button class="btn-self-play" id="selfPlayBtn" onclick="toggleSelfPlay()">觀戰模式<br><small>AI Self-Play</small></button>
            </div>
            
            <div class="status-box">
                <div id="status">Your Turn (Black)</div>
            </div>

            <div class="credits">
                Jérôme DO ESPIRITO SANTO<br>
                Shanghai University, 2026
            </div>
        </div>

        <div class="right-panel">
            <div class="board-wrapper">
                <canvas id="goBoard" width="650" height="650"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('goBoard');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const selfPlayBtn = document.getElementById('selfPlayBtn');
        const diffSelect = document.getElementById('difficulty');
        
        const boardSize = 19;
        const cellSize = canvas.width / (boardSize + 1);
        const columns = "ABCDEFGHJKLMNOPQRST"; 
        
        let boardState = {}; 
        let moveHistory = [];
        let isPlayerTurn = true;
        let isSelfPlayActive = false;

        function updateDifficultyState() {
            // Difficulty is locked if any moves have been made
            diffSelect.disabled = (moveHistory.length > 0);
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#1a110a';
            ctx.lineWidth = 1.2;
            for (let i = 1; i <= boardSize; i++) {
                ctx.moveTo(i * cellSize, cellSize);
                ctx.lineTo(i * cellSize, canvas.height - cellSize);
                ctx.moveTo(cellSize, i * cellSize);
                ctx.lineTo(canvas.width - cellSize, i * cellSize);
            }
            ctx.stroke();

            const hoshiPoints = [4, 10, 16];
            ctx.fillStyle = '#1a110a';
            hoshiPoints.forEach(x => hoshiPoints.forEach(y => {
                ctx.beginPath(); ctx.arc(x * cellSize, y * cellSize, 3.5, 0, 2 * Math.PI); ctx.fill();
            }));

            Object.entries(boardState).forEach(([coord, color]) => drawStone(coord, color));
            updateDifficultyState();
        }

        function drawStone(coord, color) {
            const pos = getPixels(coord);
            const radius = cellSize * 0.48;
            ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 4; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
            ctx.beginPath(); ctx.arc(pos.x, pos.y, radius, 0, 2 * Math.PI); ctx.shadowColor = 'transparent';
            const grad = ctx.createRadialGradient(pos.x-radius*0.3, pos.y-radius*0.3, radius*0.1, pos.x, pos.y, radius);
            if (color === 'black') { grad.addColorStop(0, '#3a3a3a'); grad.addColorStop(1, '#000'); }
            else { grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#c2b6a3'); }
            ctx.fillStyle = grad; ctx.fill();
        }

        function getPixels(coord) {
            const col = columns.indexOf(coord[0]);
            const gtpRow = parseInt(coord.substring(1));
            return { x: (col + 1) * cellSize, y: (boardSize - gtpRow + 1) * cellSize };
        }

        function getGoCoord(x, y) {
            const colIdx = Math.round(x / cellSize) - 1;
            const row = Math.round(y / cellSize);
            const gtpRow = boardSize - row + 1;
            return (colIdx >= 0 && colIdx < boardSize && row >= 1 && row <= boardSize) ? columns[colIdx] + gtpRow : null;
        }

        async function fetchAIMove() {
            const difficulty = diffSelect.value;
            try {
                const response = await fetch('/api/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: moveHistory, difficulty, board_size: boardSize })
                });
                const data = await response.json();
                return data.ai_move;
            } catch (error) {
                console.error("API Error:", error);
                return "PASS";
            }
        }

        async function runSelfPlay() {
            if (!isSelfPlayActive) return;
            const turnColor = moveHistory.length % 2 === 0 ? "Black" : "White";
            statusEl.innerText = `AI Thinking (${turnColor})...`;
            const aiMove = await fetchAIMove();
            if (aiMove.toUpperCase() === "PASS" || aiMove.toUpperCase() === "RESIGN") {
                statusEl.innerText = `Game Over - AI ${aiMove.toUpperCase()}`;
                isSelfPlayActive = false;
                selfPlayBtn.innerHTML = "觀戰模式<br><small>AI Self-Play</small>";
                return;
            }
            boardState[aiMove] = turnColor.toLowerCase();
            moveHistory.push(aiMove);
            drawBoard();
            setTimeout(runSelfPlay, 600);
        }

        function toggleSelfPlay() {
            isSelfPlayActive = !isSelfPlayActive;
            if (isSelfPlayActive) {
                selfPlayBtn.innerHTML = "停止觀戰<br><small>Stop AI</small>";
                isPlayerTurn = false;
                runSelfPlay();
            } else {
                selfPlayBtn.innerHTML = "觀戰模式<br><small>AI Self-Play</small>";
                isPlayerTurn = true;
                statusEl.innerText = "Paused. Your Turn.";
            }
        }

        canvas.addEventListener('click', async (e) => {
            if (!isPlayerTurn || isSelfPlayActive) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            const coord = getGoCoord(x, y);

            if (coord && !boardState[coord]) {
                boardState[coord] = 'black';
                moveHistory.push(coord);
                drawBoard();
                isPlayerTurn = false;
                statusEl.innerText = "KataGo is thinking...";
                
                const aiMove = await fetchAIMove();
                if (aiMove.toUpperCase() !== "PASS" && aiMove.toUpperCase() !== "RESIGN") {
                    boardState[aiMove] = 'white';
                    moveHistory.push(aiMove);
                }
                drawBoard();
                isPlayerTurn = true;
                statusEl.innerText = "Your Turn (Black)";
            }
        });

        function resetGame() {
            boardState = {}; moveHistory = []; isPlayerTurn = true; isSelfPlayActive = false;
            selfPlayBtn.innerHTML = "觀戰模式<br><small>AI Self-Play</small>";
            statusEl.innerText = "Your Turn (Black)";
            drawBoard(); // This will trigger updateDifficultyState() and enable the selector
        }

        drawBoard();
    </script>
</body>
</html>
