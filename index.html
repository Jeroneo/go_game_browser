<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KataGo 圍棋</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2235%22 cy=%2240%22 r=%2230%22 fill=%22black%22 stroke=%22%23333%22 stroke-width=%222%22/><circle cx=%2265%22 cy=%2260%22 r=%2230%22 fill=%22%23fdf5e6%22 stroke=%22%23ccc%22 stroke-width=%222%22/></svg>">
    
    <style>
        :root {
            --bg-ink: #140f0c;
            --paper-ivory: #e8dcc4;
            --gold-accent: #c5a059;
            --red-seal: #9e2a2b;
            --wood-board: #dcb35c;
            --wood-dark: #2a1c15;
            --wood-border: #4a3018;
            --win-green: #55a630;
        }

        * { box-sizing: border-box; }

        body {
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            background: radial-gradient(circle at center, #241a14 0%, var(--bg-ink) 100%);
            color: var(--paper-ivory);
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .layout-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 60px;
            width: 100%;
            max-width: 1300px;
            padding: 20px;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 320px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
        }

        .header h1 {
            margin: 0;
            font-size: 2.8rem;
            color: var(--gold-accent);
            letter-spacing: 2px;
            line-height: 1;
        }

        .header .cn-title {
            display: block;
            font-family: "MingLiU", "SimSun", serif;
            font-size: 2.2rem;
            color: var(--gold-accent);
            margin: 5px 0;
            letter-spacing: 12px;
            padding-left: 12px;
            opacity: 0.9;
        }

        .header p {
            margin: 5px 0 0 0;
            color: var(--paper-ivory);
            font-size: 0.9rem;
            letter-spacing: 3px;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .controls {
            background: rgba(42, 28, 21, 0.6);
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 22px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        select {
            background-color: var(--wood-dark);
            color: var(--paper-ivory);
            border: 1px solid var(--gold-accent);
            padding: 8px;
            font-family: inherit;
        }

        select:disabled { opacity: 0.5; cursor: not-allowed; }

        button {
            background-color: transparent;
            color: var(--red-seal);
            border: 2px solid var(--red-seal);
            padding: 8px;
            font-family: "MingLiU", "SimSun", serif;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover { background-color: var(--red-seal); color: var(--paper-ivory); }

        .btn-self-play { color: var(--gold-accent); border-color: var(--gold-accent); }
        .btn-self-play:hover { background-color: var(--gold-accent); color: var(--bg-ink); }

        .status-box {
            margin-top: 15px;
            padding: 12px;
            border-left: 3px solid var(--gold-accent);
            background: rgba(0,0,0,0.4);
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        #status { font-size: 0.95rem; line-height: 1.4; }
        .win-highlight { color: var(--win-green); font-weight: bold; }

        .credits {
            margin-top: 25px;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(232, 220, 196, 0.35);
            line-height: 1.5;
        }

        .board-wrapper {
            background: var(--wood-board);
            border: 12px solid var(--wood-border);
            box-shadow: 15px 15px 40px rgba(0,0,0,0.8);
        }

        canvas { display: block; max-width: 80vh; max-height: 80vh; }
    </style>
</head>
<body>

    <div class="layout-container">
        <div class="left-panel">
            <div class="header">
                <h1>KataGo</h1>
                <span class="cn-title">圍棋</span>
                <p>Traditional Weiqi</p>
            </div>

            <div class="controls">
                <label style="font-size: 0.75rem; color: var(--gold-accent); margin-bottom: -8px; letter-spacing: 1px;">AI STRENGTH</label>
                <select id="difficulty">
                    <option value="easy">Easy (10 Visits)</option>
                    <option value="medium" selected>Medium (100 Visits)</option>
                    <option value="hard">Hard (500 Visits)</option>
                </select>

                <button onclick="resetGame()">重新開始<br><small style="font-weight:normal; font-size: 0.7rem;">New Game</small></button>
                <button class="btn-self-play" id="selfPlayBtn" onclick="toggleSelfPlay()">觀戰模式<br><small style="font-weight:normal; font-size: 0.7rem;">AI Self-Play</small></button>
            </div>
            
            <div class="status-box">
                <div id="status">Your Turn (Black)</div>
            </div>

            <div class="credits">
                Jérôme DO ESPIRITO SANTO<br>
                Shanghai University, 2026
            </div>
        </div>

        <div class="right-panel">
            <div class="board-wrapper">
                <canvas id="goBoard" width="650" height="650"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('goBoard'), ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status'), selfPlayBtn = document.getElementById('selfPlayBtn'), diffSelect = document.getElementById('difficulty');
        
        const boardSize = 19, cellSize = canvas.width / (boardSize + 1), columns = "ABCDEFGHJKLMNOPQRST"; 
        let boardState = {}, moveHistory = [], isPlayerTurn = true, isSelfPlayActive = false;

        function updateDifficultyState() { diffSelect.disabled = (moveHistory.length > 0); }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.strokeStyle = '#1a110a'; ctx.lineWidth = 1.2;
            for (let i = 1; i <= boardSize; i++) {
                ctx.moveTo(i * cellSize, cellSize); ctx.lineTo(i * cellSize, canvas.height - cellSize);
                ctx.moveTo(cellSize, i * cellSize); ctx.lineTo(canvas.width - cellSize, i * cellSize);
            }
            ctx.stroke();
            const hoshi = [4, 10, 16]; ctx.fillStyle = '#1a110a';
            hoshi.forEach(x => hoshi.forEach(y => { ctx.beginPath(); ctx.arc(x * cellSize, y * cellSize, 3.5, 0, 2 * Math.PI); ctx.fill(); }));
            Object.entries(boardState).forEach(([coord, color]) => drawStone(coord, color));

            if (moveHistory.length > 0) {
                const last = moveHistory[moveHistory.length - 1];
                if (last.toUpperCase() !== "PASS") {
                    const pos = getPixels(last);
                    ctx.beginPath(); ctx.strokeStyle = (boardState[last] === 'black') ? 'rgba(232, 220, 196, 0.8)' : 'rgba(0, 0, 0, 0.7)';
                    ctx.lineWidth = 2.5; ctx.arc(pos.x, pos.y, cellSize * 0.18, 0, 2 * Math.PI); ctx.stroke();
                }
            }
            updateDifficultyState();
        }

        function drawStone(coord, color) {
            const p = getPixels(coord), r = cellSize * 0.48;
            ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 4; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
            ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, 2 * Math.PI); ctx.shadowColor = 'transparent';
            const g = ctx.createRadialGradient(p.x-r*0.3, p.y-r*0.3, r*0.1, p.x, p.y, r);
            if (color === 'black') { g.addColorStop(0, '#3a3a3a'); g.addColorStop(1, '#000'); }
            else { g.addColorStop(0, '#fff'); g.addColorStop(1, '#c2b6a3'); }
            ctx.fillStyle = g; ctx.fill();
        }

        function getPixels(c) { return { x: (columns.indexOf(c[0]) + 1) * cellSize, y: (boardSize - parseInt(c.substring(1)) + 1) * cellSize }; }
        function getGoCoord(x, y) {
            const col = Math.round(x / cellSize) - 1, row = Math.round(y / cellSize);
            return (col >= 0 && col < boardSize && row >= 1 && row <= boardSize) ? columns[col] + (boardSize - row + 1) : null;
        }

        // Formats GTP score (B+7.5) to human-readable (Black wins by 7.5)
        function formatScore(s) {
            if (!s || s === "PASS" || s === "Error") return "Score Settled (Draw/Unknown)";
            
            // Handle Resignation (B+R or W+R)
            if (s.includes("R")) {
                return s.startsWith("B") ? "Black Wins by Resignation (黑中盤勝)" : "White Wins by Resignation (白中盤勝)";
            }
            
            // Handle Normal Score (B+12.5)
            const winner = s.startsWith("B") ? "Black (黑勝)" : "White (白勝)";
            const points = s.includes("+") ? s.split("+")[1] : s;
            return `${winner} +${points} pts`;
        }

        async function fetchMove() {
            try {
                const res = await fetch('/api/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: moveHistory, difficulty: diffSelect.value })
                });
                const data = await res.json();
                
                // This line is the fix: It syncs the board and removes captured stones
                boardState = data.stones; 
                
                return data;
            } catch (e) { return { ai_move: "PASS", stones: boardState }; }
        }

        async function runSelfPlay() {
            if (!isSelfPlayActive) return;
            const turn = moveHistory.length % 2 === 0 ? "Black" : "White";
            statusEl.innerText = `Thinking (${turn})...`;
            const data = await fetchMove();
            if (data.ai_move.toUpperCase() === "PASS" || data.ai_move.toUpperCase() === "RESIGN") {
                statusEl.innerHTML = `<span class="win-highlight">GAME OVER:<br>${formatScore(data.score)}</span>`;
                isSelfPlayActive = false; selfPlayBtn.innerHTML = "觀戰模式<br><small>AI Self-Play</small>";
                return;
            }
            moveHistory.push(data.ai_move);
            drawBoard(); setTimeout(runSelfPlay, 600);
        }

        function toggleSelfPlay() {
            isSelfPlayActive = !isSelfPlayActive;
            if (isSelfPlayActive) { selfPlayBtn.innerHTML = "停止觀戰<br><small>Stop AI</small>"; isPlayerTurn = false; runSelfPlay(); }
            else { selfPlayBtn.innerHTML = "觀戰模式<br><small>AI Self-Play</small>"; isPlayerTurn = true; statusEl.innerText = "Paused. Your Turn."; }
        }

        canvas.addEventListener('click', async (e) => {
            if (!isPlayerTurn || isSelfPlayActive) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width), y = (e.clientY - rect.top) * (canvas.height / rect.height);
            const coord = getGoCoord(x, y);

            if (coord && !boardState[coord]) {
                moveHistory.push(coord); drawBoard(); isPlayerTurn = false;
                statusEl.innerText = "KataGo is thinking...";
                const data = await fetchMove();
                if (data.ai_move.toUpperCase() !== "PASS" && data.ai_move.toUpperCase() !== "RESIGN") {
                    moveHistory.push(data.ai_move);
                    statusEl.innerText = "Your Turn (Black)";
                } else {
                    statusEl.innerHTML = `<span class="win-highlight">GAME OVER:<br>${formatScore(data.score)}</span>`;
                }
                drawBoard(); isPlayerTurn = true;
            }
        });

        function resetGame() {
            boardState = {}; moveHistory = []; isPlayerTurn = true; isSelfPlayActive = false;
            selfPlayBtn.innerHTML = "觀戰模式<br><small>AI Self-Play</small>"; statusEl.innerText = "Your Turn (Black)"; drawBoard();
        }
        drawBoard();
    </script>
</body>
</html>
