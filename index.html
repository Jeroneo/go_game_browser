<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KataGo 圍棋</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2235%22 cy=%2240%22 r=%2230%22 fill=%22black%22 stroke=%22%23333%22 stroke-width=%222%22/><circle cx=%2265%22 cy=%2260%22 r=%2230%22 fill=%22%23fdf5e6%22 stroke=%22%23ccc%22 stroke-width=%222%22/></svg>">
    
    <style>
        :root {
            --bg-ink: #140f0c;
            --bg-ink-light: #241a14;
            --paper-ivory: #e8dcc4;
            --gold-accent: #c5a059;
            --red-seal: #9e2a2b;
            --wood-board: #dcb35c;
            --wood-board-dark: #c99a45;
            --wood-dark: #2a1c15;
            --wood-border: #4a3018;
            --win-green: #55a630;
        }

        * { box-sizing: border-box; }

        body {
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            background: radial-gradient(circle at center, var(--bg-ink-light) 0%, var(--bg-ink) 100%);
            color: var(--paper-ivory);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .layout-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 80px;
            width: 100%;
            max-width: 1400px;
            padding: 40px 20px;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            max-width: 380px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(197, 160, 89, 0.2);
            padding-bottom: 20px;
            position: relative;
        }

        .header h1 {
            margin: 0;
            font-size: 3.2rem;
            color: var(--gold-accent);
            letter-spacing: 4px;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .header .cn-title {
            display: block;
            font-family: "MingLiU", "SimSun", serif;
            font-size: 2.5rem;
            color: var(--gold-accent);
            margin: 10px 0;
            letter-spacing: 16px;
            padding-left: 16px;
            opacity: 0.95;
        }

        .header p {
            margin: 5px 0 0 0;
            color: var(--paper-ivory);
            font-size: 0.95rem;
            letter-spacing: 4px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .controls {
            background: linear-gradient(180deg, rgba(42, 28, 21, 0.8) 0%, rgba(20, 15, 12, 0.8) 100%);
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 25px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .diff-group {
            grid-column: span 2;
            display: flex;
            flex-direction: column;
            margin-bottom: 5px;
        }

        .diff-group label {
            font-size: 0.75rem;
            color: var(--gold-accent);
            margin-bottom: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        select {
            background-color: var(--bg-ink);
            color: var(--paper-ivory);
            border: 1px solid rgba(197, 160, 89, 0.4);
            padding: 10px 12px;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }
        
        select:hover:not(:disabled) { border-color: var(--gold-accent); }
        select:focus { outline: none; border-color: var(--gold-accent); }
        select:disabled { opacity: 0.5; cursor: not-allowed; }

        button {
            background-color: rgba(0,0,0,0.2);
            color: var(--red-seal);
            border: 1px solid var(--red-seal);
            padding: 12px 10px;
            font-family: "MingLiU", "SimSun", serif;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        button small {
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            font-weight: normal;
            font-size: 0.75rem;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        button:hover:not(:disabled) { 
            background-color: var(--red-seal); 
            color: var(--paper-ivory); 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(158, 42, 43, 0.3);
        }

        .btn-self-play { color: var(--gold-accent); border-color: var(--gold-accent); }
        .btn-self-play:hover:not(:disabled) { 
            background-color: var(--gold-accent); 
            color: var(--bg-ink); 
            box-shadow: 0 4px 12px rgba(197, 160, 89, 0.3);
        }

        .btn-pass { color: #8cb99b; border-color: #8cb99b; }
        .btn-pass:hover:not(:disabled) { 
            background-color: #8cb99b; 
            color: var(--bg-ink); 
            box-shadow: 0 4px 12px rgba(140, 185, 155, 0.3);
        }
        
        button:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        .illegal-flash { color: #e05a5a; }

        .status-box {
            margin-top: 20px;
            padding: 15px 20px;
            border-left: 4px solid var(--gold-accent);
            background: linear-gradient(90deg, rgba(197, 160, 89, 0.1) 0%, rgba(0,0,0,0) 100%);
            border-radius: 0 4px 4px 0;
            min-height: 65px;
            display: flex;
            align-items: center;
        }

        #status { 
            font-size: 1.05rem; 
            line-height: 1.5; 
            letter-spacing: 0.5px;
        }
        
        .win-highlight { color: var(--win-green); font-weight: bold; }

        .credits {
            margin-top: 35px;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(232, 220, 196, 0.4);
            line-height: 1.8;
        }

        .credits a {
            color: var(--gold-accent);
            text-decoration: none;
            border-bottom: 1px dotted var(--gold-accent);
            padding-bottom: 2px;
            transition: all 0.2s;
        }
        
        .credits a:hover {
            opacity: 0.7;
            border-bottom-style: solid;
        }

        .right-panel {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .board-wrapper {
            background: linear-gradient(135deg, var(--wood-board) 0%, var(--wood-board-dark) 100%);
            border: 14px solid var(--wood-border);
            border-radius: 6px;
            box-shadow: 
                20px 20px 50px rgba(0,0,0,0.8), 
                inset 0 0 30px rgba(0,0,0,0.2),
                inset 0 0 10px rgba(255,255,255,0.1);
            cursor: crosshair;
            padding: 5px; /* Slight padding inside the border */
        }

        canvas { 
            display: block; 
            max-width: 85vh; 
            max-height: 85vh; 
            border-radius: 2px;
        }

        /* Responsive adjustments */
        @media (max-width: 900px) {
            .layout-container { gap: 40px; padding: 20px; }
            .left-panel { max-width: 100%; }
            .header { margin-bottom: 20px; }
            .board-wrapper { border-width: 8px; }
            canvas { max-width: 100%; max-height: auto; }
        }
    </style>
</head>
<body>

    <div class="layout-container">
        <div class="left-panel">
            <div class="header">
                <h1>KataGo</h1>
                <span class="cn-title">圍棋</span>
                <p>Traditional Weiqi</p>
            </div>

            <div class="controls">
                <div class="diff-group">
                    <label for="difficulty">AI Strength</label>
                    <select id="difficulty">
                        <option value="easy">Easy (10 Visits)</option>
                        <option value="medium" selected>Medium (100 Visits)</option>
                        <option value="hard">Hard (500 Visits)</option>
                    </select>
                </div>

                <button onclick="resetGame()">重新開始<small>New Game</small></button>
                <button class="btn-pass" id="passBtn" onclick="playerPass()">虛手<small>Pass Turn</small></button>
                <button class="btn-resign" id="resignBtn" onclick="playerResign()">投降<small>Resign</small></button>
                <button class="btn-self-play" id="selfPlayBtn" onclick="toggleSelfPlay()">觀戰模式<small>AI Self-Play</small></button>
            </div>
            
            <div class="status-box">
                <div id="status">Your Turn (Black)</div>
            </div>

            <div class="credits">
                Jérôme DO ESPIRITO SANTO<br>
                Shanghai University, 2026<br>
                <a href="https://github.com/Jeroneo/go_game_browser" target="_blank">View on GitHub</a>
            </div>
        </div>

        <div class="right-panel">
            <div class="board-wrapper">
                <canvas id="goBoard" width="650" height="650"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('goBoard'), ctx = canvas.getContext('2d');
        const statusEl  = document.getElementById('status');
        const selfPlayBtn = document.getElementById('selfPlayBtn');
        const passBtn     = document.getElementById('passBtn');
        const resignBtn   = document.getElementById('resignBtn');
        const diffSelect  = document.getElementById('difficulty');

        const boardSize = 19, cellSize = canvas.width / (boardSize + 1), columns = "ABCDEFGHJKLMNOPQRST";

        // ── Mutable game state ──
        let boardState       = {};   // coord → 'black'|'white'
        let moveHistory      = [];   // GTP move list sent to backend
        let boardHistory     = [];   // serialised board after each half-move (for Ko)
        let consecutivePasses = 0;
        let isPlayerTurn     = true;
        let isSelfPlayActive = false;
        let isGameOver       = false;
        let hoverCoord       = null; // Stores the current coordinate the mouse is hovering over

        // ─────────────────────────────────────────────
        // Go rules
        // ─────────────────────────────────────────────

        function getNeighbors(coord) {
            const col = columns.indexOf(coord[0]), row = parseInt(coord.substring(1));
            const nb = [];
            if (col > 0)            nb.push(columns[col - 1] + row);
            if (col < boardSize - 1) nb.push(columns[col + 1] + row);
            if (row > 1)            nb.push(coord[0] + (row - 1));
            if (row < boardSize)    nb.push(coord[0] + (row + 1));
            return nb;
        }

        function getGroup(coord, state) {
            const color = state[coord], group = new Set(), queue = [coord];
            while (queue.length) {
                const c = queue.pop();
                if (group.has(c)) continue;
                group.add(c);
                getNeighbors(c).forEach(n => { if (state[n] === color && !group.has(n)) queue.push(n); });
            }
            return group;
        }

        function getLiberties(group, state) {
            const libs = new Set();
            group.forEach(c => getNeighbors(c).forEach(n => { if (!state[n]) libs.add(n); }));
            return libs;
        }

        function serializeBoard(state) {
            return Object.keys(state).sort().map(k => k + state[k][0]).join('');
        }

        function tryPlaceStone(coord, color) {
            if (boardState[coord]) return 'occupied';

            const sim = { ...boardState };
            sim[coord] = color;
            const opp = color === 'black' ? 'white' : 'black';

            getNeighbors(coord).forEach(n => {
                if (sim[n] === opp) {
                    const g = getGroup(n, sim);
                    if (getLiberties(g, sim).size === 0) g.forEach(c => delete sim[c]);
                }
            });

            if (getLiberties(getGroup(coord, sim), sim).size === 0) return 'suicide';

            const serial = serializeBoard(sim);
            if (boardHistory.some(h => h === serial)) return 'ko';

            boardHistory.push(serializeBoard(boardState));
            Object.keys(boardState).forEach(k => delete boardState[k]);
            Object.assign(boardState, sim);
            return 'ok';
        }

        function applyAIMove(coord, color) {
            boardState[coord] = color;
            const opp = color === 'black' ? 'white' : 'black';
            getNeighbors(coord).forEach(n => {
                if (boardState[n] === opp) {
                    const g = getGroup(n, boardState);
                    if (getLiberties(g, boardState).size === 0) g.forEach(c => delete boardState[c]);
                }
            });
            boardHistory.push(serializeBoard(boardState));
        }

        // ─────────────────────────────────────────────
        // Drawing
        // ─────────────────────────────────────────────

        function updateDifficultyState() { diffSelect.disabled = (moveHistory.length > 0); }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.strokeStyle = '#1a110a'; ctx.lineWidth = 1.2;
            for (let i = 1; i <= boardSize; i++) {
                ctx.moveTo(i * cellSize, cellSize); ctx.lineTo(i * cellSize, canvas.height - cellSize);
                ctx.moveTo(cellSize, i * cellSize); ctx.lineTo(canvas.width - cellSize, i * cellSize);
            }
            ctx.stroke();
            const hoshi = [4, 10, 16]; ctx.fillStyle = '#1a110a';
            hoshi.forEach(x => hoshi.forEach(y => { ctx.beginPath(); ctx.arc(x * cellSize, y * cellSize, 3.5, 0, 2 * Math.PI); ctx.fill(); }));
            
            // Draw all placed stones
            Object.entries(boardState).forEach(([coord, color]) => drawStone(coord, color));

            // Draw translucent hover stone
            if (hoverCoord && !boardState[hoverCoord] && isPlayerTurn && !isGameOver && !isSelfPlayActive) {
                ctx.globalAlpha = 0.6; // Make it semi-transparent
                drawStone(hoverCoord, 'black');
                ctx.globalAlpha = 1.0; // Reset alpha
            }

            // Last-move marker
            if (moveHistory.length > 0) {
                const last = moveHistory[moveHistory.length - 1];
                if (last.toUpperCase() !== "PASS" && boardState[last]) {
                    const pos = getPixels(last);
                    ctx.beginPath();
                    ctx.strokeStyle = (boardState[last] === 'black') ? 'rgba(232,220,196,0.8)' : 'rgba(0,0,0,0.7)';
                    ctx.lineWidth = 2.5;
                    ctx.arc(pos.x, pos.y, cellSize * 0.18, 0, 2 * Math.PI);
                    ctx.stroke();
                }
            }
            updateDifficultyState();
        }

        function drawStone(coord, color) {
            const p = getPixels(coord), r = cellSize * 0.48;
            ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 4; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
            ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, 2 * Math.PI); ctx.shadowColor = 'transparent';
            const g = ctx.createRadialGradient(p.x - r * 0.3, p.y - r * 0.3, r * 0.1, p.x, p.y, r);
            if (color === 'black') { g.addColorStop(0, '#3a3a3a'); g.addColorStop(1, '#000'); }
            else                   { g.addColorStop(0, '#fff');    g.addColorStop(1, '#c2b6a3'); }
            ctx.fillStyle = g; ctx.fill();
        }

        function getPixels(c) {
            return { x: (columns.indexOf(c[0]) + 1) * cellSize, y: (boardSize - parseInt(c.substring(1)) + 1) * cellSize };
        }

        function getGoCoord(x, y) {
            const col = Math.round(x / cellSize) - 1, row = Math.round(y / cellSize);
            return (col >= 0 && col < boardSize && row >= 1 && row <= boardSize) ? columns[col] + (boardSize - row + 1) : null;
        }

        // ─────────────────────────────────────────────
        // Helpers
        // ─────────────────────────────────────────────

        function formatScore(s) {
            if (!s || s === "PASS" || s === "Error") return "Score Settled (Draw/Unknown)";
            if (s.includes("R")) return s.startsWith("B") ? "Black Wins by Resignation (黑中盤勝)" : "White Wins by Resignation (白中盤勝)";
            const winner = s.startsWith("B") ? "Black (黑勝)" : "White (白勝)";
            const points = s.includes("+") ? s.split("+")[1] : s;
            return `${winner} +${points} pts`;
        }

        function showIllegal(reason) {
            const msgs = { ko: '⛔ Illegal — Ko rule', suicide: '⛔ Illegal — Suicide', occupied: '⛔ Intersection occupied' };
            statusEl.innerHTML = `<span class="illegal-flash">${msgs[reason] || '⛔ Illegal move'}</span>`;
            setTimeout(() => { if (!isGameOver) statusEl.innerText = 'Your Turn (Black)'; }, 1800);
        }

        async function fetchMove() {
            try {
                const res = await fetch('/api/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: moveHistory, difficulty: diffSelect.value, board_size: boardSize })
                });
                return await res.json();
            } catch (e) { return { ai_move: "PASS", score: "Error" }; }
        }

        function endGame(score) {
            isGameOver = true;
            isSelfPlayActive = false;
            isPlayerTurn = false;
            hoverCoord = null;
            passBtn.disabled = true;
            resignBtn.disabled = true;
            selfPlayBtn.innerHTML = "觀戰模式<br><small>AI Self-Play</small>";
            statusEl.innerHTML = `<span class="win-highlight">GAME OVER:<br>${formatScore(score)}</span>`;
            drawBoard();
        }

        // ─────────────────────────────────────────────
        // Self-play
        // ─────────────────────────────────────────────

        async function runSelfPlay() {
            if (!isSelfPlayActive) return;
            const turn = moveHistory.length % 2 === 0 ? 'black' : 'white';
            statusEl.innerText = `Thinking (${turn === 'black' ? 'Black' : 'White'})...`;
            const data = await fetchMove();
            const move = data.ai_move.toUpperCase();

            if (move === "RESIGN") { endGame(data.score); return; }

            if (move === "PASS") {
                consecutivePasses++;
                moveHistory.push("PASS");
                if (consecutivePasses >= 2) { endGame(data.score); return; }
                statusEl.innerText = `${turn === 'black' ? 'Black' : 'White'} passes...`;
                drawBoard();
                setTimeout(runSelfPlay, 800);
                return;
            }

            consecutivePasses = 0;
            applyAIMove(data.ai_move, turn);
            moveHistory.push(data.ai_move);
            drawBoard();
            runSelfPlay();
        }

        function toggleSelfPlay() {
            isSelfPlayActive = !isSelfPlayActive;
            if (isSelfPlayActive) {
                hoverCoord = null;
                selfPlayBtn.innerHTML = "停止觀戰<br><small>Stop AI</small>";
                passBtn.disabled = true;
                resignBtn.disabled = true;
                isPlayerTurn = false;
                runSelfPlay();
            } else {
                selfPlayBtn.innerHTML = "觀戰模式<br><small>AI Self-Play</small>";
                passBtn.disabled = false;
                resignBtn.disabled = false;
                isPlayerTurn = true;
                statusEl.innerText = "Paused. Your Turn.";
            }
            drawBoard();
        }

        // ─────────────────────────────────────────────
        // Player pass
        // ─────────────────────────────────────────────

        async function playerPass() {
            if (!isPlayerTurn || isSelfPlayActive || isGameOver) return;
            isPlayerTurn = false;
            hoverCoord = null;
            drawBoard();
            
            consecutivePasses++;
            moveHistory.push("PASS");

            if (consecutivePasses >= 2) {
                const data = await fetchMove(); 
                endGame(data.score);
                return;
            }

            statusEl.innerText = "You passed. KataGo is thinking...";
            const data = await fetchMove();
            const move = data.ai_move.toUpperCase();

            if (move === "RESIGN") { endGame(data.score); return; }

            if (move === "PASS") {
                consecutivePasses++;
                moveHistory.push("PASS");
                endGame(data.score);
                return;
            }

            consecutivePasses = 0;
            applyAIMove(data.ai_move, 'white');
            moveHistory.push(data.ai_move);
            statusEl.innerText = "Your Turn (Black)";
            isPlayerTurn = true;
            drawBoard();
        }

        // ─────────────────────────────────────────────
        // Player resign
        // ─────────────────────────────────────────────

        function playerResign() {
            if (!isPlayerTurn || isSelfPlayActive || isGameOver) return;
            endGame("W+R");
        }

        // ─────────────────────────────────────────────
        // Canvas Interactions (Click & Hover)
        // ─────────────────────────────────────────────

        canvas.addEventListener('mousemove', (e) => {
            if (!isPlayerTurn || isSelfPlayActive || isGameOver) {
                if (hoverCoord !== null) {
                    hoverCoord = null;
                    drawBoard();
                }
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top)  * (canvas.height / rect.height);
            const coord = getGoCoord(x, y);

            if (coord !== hoverCoord) {
                hoverCoord = coord;
                drawBoard();
            }
        });

        canvas.addEventListener('mouseout', () => {
            if (hoverCoord !== null) {
                hoverCoord = null;
                drawBoard();
            }
        });

        canvas.addEventListener('click', async (e) => {
            if (!isPlayerTurn || isSelfPlayActive || isGameOver) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top)  * (canvas.height / rect.height);
            const coord = getGoCoord(x, y);
            if (!coord) return;

            const result = tryPlaceStone(coord, 'black');
            if (result !== 'ok') { showIllegal(result); return; }

            consecutivePasses = 0;
            moveHistory.push(coord);
            isPlayerTurn = false;
            hoverCoord = null; // Clear hover immediately after placing
            drawBoard();
            statusEl.innerText = "KataGo is thinking...";

            const data = await fetchMove();
            const move = data.ai_move.toUpperCase();

            if (move === "RESIGN") { endGame(data.score); return; }

            if (move === "PASS") {
                consecutivePasses++;
                moveHistory.push("PASS");
                if (consecutivePasses >= 2) { endGame(data.score); return; }
                statusEl.innerText = "KataGo passed. Your Turn (Black)";
            } else {
                consecutivePasses = 0;
                applyAIMove(data.ai_move, 'white');
                moveHistory.push(data.ai_move);
                statusEl.innerText = "Your Turn (Black)";
            }

            isPlayerTurn = true;
            drawBoard();
        });

        // ─────────────────────────────────────────────
        // Reset
        // ─────────────────────────────────────────────

        function resetGame() {
            boardState = {}; moveHistory = []; boardHistory = [];
            consecutivePasses = 0; isPlayerTurn = true; isSelfPlayActive = false; isGameOver = false; hoverCoord = null;
            selfPlayBtn.innerHTML = "觀戰模式<br><small>AI Self-Play</small>";
            passBtn.disabled = false;
            resignBtn.disabled = false;
            statusEl.innerText = "Your Turn (Black)";
            drawBoard();
        }

        drawBoard();
    </script>
</body>
</html>
